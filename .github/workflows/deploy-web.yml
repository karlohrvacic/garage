name: Deploy web

# Builds the Flutter web app in CI and deploys the static output to
# Cloudflare Pages on every push to main. No keystore, no store — the app
# installs from the browser as a PWA.
#
# Flutter builds here (GitHub Actions) rather than in Cloudflare's build image,
# which has no Flutter SDK; only the finished build/web is handed to Cloudflare.
#
# One-time setup:
#   1. Cloudflare dashboard → Workers & Pages → Create → Pages →
#        "Direct Upload", name the project exactly:  garage
#      (custom domain, e.g. garage.hrva.cc, is added in that project's settings.)
#   2. Cloudflare → My Profile → API Tokens → Create Token →
#        template "Edit Cloudflare Workers" (or a custom token with
#        Account · Cloudflare Pages · Edit). Copy the token.
#      Account ID is on the Workers & Pages overview page.
#   3. GitHub → Settings → Secrets and variables → Actions → Secrets:
#        CLOUDFLARE_API_TOKEN   = <the token>
#        CLOUDFLARE_ACCOUNT_ID  = <your account id>
#        SUPABASE_URL           = https://<ref>.supabase.co
#        SUPABASE_ANON_KEY      = <the anon / publishable key>
#
# Google sign-in is intentionally left unconfigured here, so the web build is
# email + password only. Add a GOOGLE_WEB_CLIENT_ID dart-define later to enable it.

on:
  push:
    branches: [main]
  workflow_dispatch:

# Let a newer deploy cancel an in-progress one.
concurrency:
  group: pages-deploy
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.6'
          channel: stable
          cache: true

      - run: flutter pub get

      - name: Build web
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: |
          flutter build web --release \
            --base-href "/" \
            --dart-define=SUPABASE_URL="$SUPABASE_URL" \
            --dart-define=SUPABASE_ANON_KEY="$SUPABASE_ANON_KEY"

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy build/web --project-name=garage --branch=main
